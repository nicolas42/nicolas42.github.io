<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <link rel="stylesheet" href="reset.css">
</head>
<body>
<canvas id="canvas" width="1000" height="1000">
<p id="console"></p>


</body>
<script>

function gameOfLife(arg){
	
	// Defaults
	var querySelector 	= "canvas"
	var width 			= window.innerWidth;
	var height 			= window.innerHeight;
	var white 			= [255, 255, 255, 255];
	var black 			= [0, 0, 0, 255];
	// unset setArgs to use a giant function that can override the default parameters
	setArgs(arg);

	// Get the canvas from the document and set its width and height
	var canvas 			= document.querySelector(querySelector);	
	canvas.width		= width;
	canvas.height		= height;
	// Get the 2D drawing context from the canvas and the associated image data
	var ctx 			= canvas.getContext("2d");
	var imgData 		= ctx.getImageData(0, 0, width, height);
	var data 			= imgData.data;

	// These rely on the previous initialized data
	function setArgs(arg){
		// Get Parameters From Function Argument
		if(arg !== undefined){
			if(arg.width !== undefined) {width = arg.width;}
			if(arg.height !== undefined) {height = arg.height;}
			if(arg.querySelector !== undefined) {querySelector = arg.querySelector;}
			if(arg.liveColor !== undefined) {liveColor = arg.liveColor;}
			if(arg.deadColor !== undefined) {deadColor = arg.deadColor;}
		}
	}
	function drawRandomPoints(){

		ctx.fillStyle = 'white'
		ctx.fillRect(0, 0, width, height);	
		// Add random initial points which fill 10% of the usable space
		for (i = 0; i < 0.1 * width * height; i += 1) {
			var x = Math.round( Math.random() * (width - 1) );
			var y = Math.round( Math.random() * (height - 1) );
			ctx.fillStyle = 'black';
			ctx.fillRect(x,y,1,1);
		}
	}
	function drawClickedPosition(e) {
		var rect = e.currentTarget.getBoundingClientRect();
		var x = e.clientX - rect.left;
		var y = e.clientY - rect.top;  
		if (e.which === 1){ // left click
			ctx.fillStyle = 'black';
			ctx.fillRect(x,y,1,1); // fill in the pixel at (x,y)
		}
	}
	function evolve() {

		var ctx = canvas.getContext("2d");
		var imgData = ctx.getImageData(0, 0, width, height);
		var data = imgData.data;

	  var neighbours;
	  var live; // whether to live or die. 1 = live, 0 = die
	  var stride = 4;
	  // zero neighbors
	  for (y = 1; y < height - 1; y = y + 1) {
	    for (x = 1; x < width - 1; x = x + 1) {
	      pos = y * width * 4 + x * 4;

	      data[pos + 3] = 0; 	// pos+3 refers to the alpha channel of the pixel
	    }
	  }


	  // update neighbors
	  for (y = 1; y < height - 1; y = y + 1) {
	    for (x = 1; x < width - 1; x = x + 1) {
	      pos = y * width * 4 + x * 4;

	      if (data[pos + 0] === black[0]) { // currCell.isAlive
			  // These positions represent a 3x3 box around the current cell
			  // We add one to the neighbours of all of the surrounding cells
			  // if the current cell is alive

	        data[pos+3 	- (width-1) 	* stride] += 1;
	        data[pos+3 	- (width) 		* stride] += 1;
	        data[pos+3 	- (width+1) 	* stride] += 1;
	        data[pos+3 	- 1				* stride] += 1;
	        // position of the current cell
	        data[pos+3 	+ 1				* stride] += 1;
	        data[pos+3 	+ (width-1)		* stride] += 1;
	        data[pos+3 	+ (width)  		* stride] += 1;
	        data[pos+3 	+ (width+1)		* stride] += 1;
	      }
	    }
	  }

	  // update the living
	  for (y = 1; y < height - 1; y = y + 1) {
	    for (x = 1; x < width - 1; x = x + 1) {
	      pos = y * width * 4 + x * 4;
	      neighbours = data[pos + 3];
	      live = 0; // determines whether cell lives or dies

	      if (data[pos + 0] === black[0]) { // currCell.isAlive
	        if (neighbours < 2) {
	          live = 0; // false
	        } else if ((neighbours === 2) || (neighbours === 3)) {
	          live = 1; // true
	        } else if (neighbours > 3) {
	          live = 0; // false
	        }
	      } else {
	        if (neighbours === 3) {
	          live = 1; // true
	        }
	      }
	      if (live === 1) {
	        data[pos + 0] = black[0];
	        data[pos + 1] = black[1];
	        data[pos + 2] = black[2];
	        data[pos + 3] = black[3];
	      } else {
	        data[pos + 0] = white[0];
	        data[pos + 1] = white[1];
	        data[pos + 2] = white[2];
	        data[pos + 3] = white[3];
	      }
	    }
	  }

	  ctx.putImageData(imgData, 0, 0);
	}
	id = setInterval(evolve, 20);
	function pause(){clearInterval(id)}
	function play(){id = setInterval(evolve, 20)}

	// Initialize the image and set event handler callbacks
	drawRandomPoints();
	canvas.addEventListener("mousedown",	pause,					false);
	canvas.addEventListener("mouseup",		play,					false);
	canvas.addEventListener("mousemove",	drawClickedPosition,	false);

}

gameOfLife({querySelector: "canvas", width: window.innerWidth, height: window.innerHeight})

</script>
</html>
