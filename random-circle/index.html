To reset transforms caused by translate and rotate use setTransform.
Calling ctx.setTransform without any parameters will reset all of the previous transformations.
settransform https://www.w3schools.com/tags/canvas_settransform.asp
 -->

 <html>
<body>




<canvas></canvas>
<script>

function draw_circular_pattern(canvas, angle, color, max_distance, scale)
{
    let ctx = canvas.getContext('2d');

    ctx.setTransform(); // reset all transforms

    ctx.fillStyle = "black";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.translate(canvas.width / 2, canvas.height / 2);
    ctx.scale(scale, scale);

    for (let distance = 0; distance < max_distance; distance += 1) {
        ctx.strokeStyle = color;
        ctx.lineWidth = 3;

        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(0, distance);
        ctx.stroke();

        ctx.translate(0, distance);
        ctx.rotate(angle);
    }
}


let canvas = document.querySelector('canvas');
canvas.width = 800;
canvas.height = 800;


var angle = Math.random() * 2 * Math.PI;
var color = "#" + Math.floor(Math.random() * 16777216).toString(16); // 16777216 == 2^24
var max_distance = 500;
var scale = 0.5;
draw_circular_pattern(canvas, angle, color, max_distance, scale);

</script>





<input  id="angle_slider" style="width:800px" type="range" min="1" max="100" value="50">
<script>
var angle_slider = document.querySelector("#angle_slider");
angle_slider.oninput = function () {
    console.log(this.value);

    angle = this.value / 100 * 2 * Math.PI;
    color = "#" + Math.floor(Math.random() * 16777216).toString(16);
    // var max_distance = 500;
    draw_circular_pattern(canvas, angle, color, max_distance, scale);
}

</script>
