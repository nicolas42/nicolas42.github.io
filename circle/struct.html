<!-- 
credit https://slicker.me/javascript/turtle.htm
canvas ref https://www.w3schools.com/tags/ref_canvas.asp

To reset transforms caused by translate and rotate use setTransform.
Calling ctx.setTransform without any parameters will reset all of the previous transformations.
settransform https://www.w3schools.com/tags/canvas_settransform.asp
 -->

 <html>
<body>
<canvas></canvas>
<script>

function draw_circle_pattern(arg)
{
    

    let ctx = arg.canvas.getContext('2d');

    ctx.setTransform(); // reset all transforms

    ctx.fillStyle = "black";
    ctx.fillRect(0, 0, arg.canvas.width, arg.canvas.height);

    ctx.translate(arg.canvas.width / 2, arg.canvas.height / 2);
    ctx.scale(arg.scale, arg.scale);

    for (let distance = 0; distance < arg.max_distance; distance += 1) {
        ctx.strokeStyle = arg.color;
        ctx.lineWidth = arg.line_width;

        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(0, distance);
        ctx.stroke();

        ctx.translate(0, distance);
        ctx.rotate(arg.angle);
    }
}

function random_color()
{
    return "#" + Math.floor(Math.random() * 16777216).toString(16);
}



var entity = { 
    canvas: document.querySelector('canvas'),
    angle: Math.random() * 2 * Math.PI,
    color: random_color(),
    max_distance: 500,
    scale: 1,
    line_width: 2,
    step: 1
}

entity.canvas.width = 800,
entity.canvas.height = 800,

draw_circle_pattern(entity);

</script>



<script>
entity.canvas.onwheel = function(event)
{
    event.preventDefault();
    entity.angle += event.deltaY / 100000 * 2 * Math.PI;
    entity.color = random_color();
    draw_circle_pattern(entity);

}
</script>




<input  id="angle_slider" style="width:800px" type="range" min="1" max="10000" value="5000">
<script>
document.querySelector("#angle_slider").oninput = function () {
    entity.angle = this.value / 10000 * 2 * Math.PI;
    entity.color = random_color();
    draw_circle_pattern(entity);
}
</script>




<input  id="scale_slider" style="width:800px" type="range" min="1" max="200" value="100">
<script>
document.querySelector("#scale_slider").oninput = function () {
    entity.scale = this.value / 100;
    entity.color = random_color();
    draw_circle_pattern(entity);
}
</script>




<input  id="max_distance_slider" style="width:800px" type="range" min="1" max="1000" value="500">
<script>
document.querySelector("#max_distance_slider").oninput = function () {
    entity.max_distance = this.value;
    entity.color = random_color();
    draw_circle_pattern(entity);
}
</script>



</body>
</html>
