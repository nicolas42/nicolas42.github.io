<!-- https://eloquentjavascript.net/15_event.html -->
<textarea autofocus></textarea>
<p></p>
<span></span>

<script>

    /* import Math */ (function(){ Object.getOwnPropertyNames(Math).forEach(function(a){eval(a+"="+"Math."+a+"\t")}); })();
    document.querySelector('span').innerHTML = (function(){ let o=[];  Object.getOwnPropertyNames(Math).forEach(function(a){o.push(" "+a)});  return o.toString(); })();

    window.addEventListener("keyup", event => {

        let textarea, p, result, input;

        textarea = document.querySelector('textarea');
        p = document.querySelector('p');

        input = textarea.value.replace(/\^/g, "**")
        result = eval(input);
        p.innerHTML = "= "+result.toString();

    });


//   window.addEventListener("keydown", event => {
//     console.dir(event.key);
//   });

</script>
<script src='autosize.js'></script>
<script>
    autosize(document.querySelector('textarea'));
</script>
